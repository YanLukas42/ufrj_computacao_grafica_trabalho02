<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabalho 02 - Computação Gráfica</title>
    <style>
        /* Reset básico para garantir que fique bonito em qualquer navegador */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Centraliza o conteúdo na tela e coloca um fundo cinza claro */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f6f8fa;
        }

        /* Estilo do cartão branco */
        .card {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        .card h1 {
            color: #24292f;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .card p {
            color: #57606a;
            font-size: 16px;
            margin-bottom: 30px;
        }

        /* Estilo do botão do GitHub */
        .btn-github {
            display: inline-block;
            background-color: #2da44e; /* Verde padrão de botões de ação do GitHub */
            color: #ffffff;
            text-decoration: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: 600;
            font-size: 16px;
            transition: background-color 0.2s ease-in-out;
        }

        /* Efeito ao passar o mouse por cima do botão */
        .btn-github:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Computação Gráfica</h1>
        <p>UFRJ - Trabalho 02</p>
        
        <a href="https://github.com/YanLukas42/ufrj_computacao_grafica_trabalho02" target="_blank" class="btn-github">
            Acessar Repositório
        </a>
    </div>

</body>
</html>
